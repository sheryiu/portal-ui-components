@if (!isInvalid()) {
  <time [dateTime]="date() | date: 'yyyy-MM-dd\'T\'HH:mm:ss.SSS'">
    @if (mode() === 'normal') {
      @if (usingCustomFormatter()) {
        {{ formattedDate() }}
      } @else {
        {{ date()! | date: format() }}
      }
    } @else if (mode() === 'timeAgo') {
      {{ date()! | timeAgo }}
    }
  </time>
} @else {
  <ng-content></ng-content>
}
