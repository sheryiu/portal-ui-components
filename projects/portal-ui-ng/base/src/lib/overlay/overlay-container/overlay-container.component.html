@if (showing()) {
  @if (config.animateEnter || config.animateLeave) {
    <div [animate.enter]="config.animateEnter" [animate.leave]="config.animateLeave" (animationend)="animationEnded($event)">
      @if (component) {
        <ng-container [ngComponentOutlet]="component"></ng-container>
      } @else if (templateRef) {
        <ng-container
          [ngTemplateOutlet]="templateRef"
          [ngTemplateOutletInjector]="injector"
          [ngTemplateOutletContext]="{ $implicit: data }"
        ></ng-container>
      }
    </div>
  } @else {
    <div>
      @if (component) {
        <ng-container [ngComponentOutlet]="component"></ng-container>
      } @else if (templateRef) {
        <ng-container
          [ngTemplateOutlet]="templateRef"
          [ngTemplateOutletInjector]="injector"
          [ngTemplateOutletContext]="{ $implicit: data }"
        ></ng-container>
      }
    </div>
  }
}
